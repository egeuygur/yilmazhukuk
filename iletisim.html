<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yılmaz Hukuk | İletişim</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4a373; --dark: #121212; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f4f4f4; overflow-x: hidden; }

        header { background: var(--dark); padding: 15px 5%; text-align: center; border-bottom: 2px solid var(--gold); }
        .logo { color: white; text-decoration: none; font-family: 'Playfair Display', serif; font-size: 1.5rem; }

        .container {
            max-width: 900px;
            margin: 60px auto;
            background: white;
            display: flex;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out;
        }

        .info-side { background: var(--dark); color: white; padding: 50px; flex: 1; }
        .info-side h2 { color: var(--gold); margin-bottom: 30px; font-family: 'Playfair Display', serif; }
        
        .form-side { padding: 50px; flex: 1.5; }
        .form-side h2 { margin-bottom: 30px; }

        input, textarea { 
            width: 100%; padding: 12px; margin-bottom: 20px; 
            border: 1px solid #ddd; border-radius: 5px; outline: none; 
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--gold); box-shadow: 0 0 8px rgba(212, 163, 115, 0.2); }

        .btn { 
            background: var(--gold); color: white; border: none; padding: 15px; 
            width: 100%; cursor: pointer; font-weight: bold; border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover { background: #bc8a5f; letter-spacing: 1px; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) { 
            .container { flex-direction: column; margin: 20px; }
            .info-side, .form-side { padding: 30px; }
            header { padding: 10px 5%; }
            .logo { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">YILMAZ HUKUK</a>
    </header>

    <div class="container">
        <div class="info-side">
            <h2>İletişim</h2>
            <p style="margin-bottom:20px; opacity:0.8;">Hukuki süreçleriniz hakkında bilgi almak için formu doldurabilir veya doğrudan arayabilirsiniz.</p>
            <p><strong>Telefon:</strong><br> 0 (538) 352 38 88</p><br>
            <p><strong>E-posta:</strong><br> bilgi@yilmazhukuk.com</p>
        </div>
        <div class="form-side">
            <h2>Hızlı Mesaj</h2>
            <form>
                <input type="text" placeholder="Ad Soyad">
                <input type="email" placeholder="E-posta">
                <textarea rows="4" placeholder="Konu ve Mesajınız"></textarea>
                <button type="submit" class="btn">GÖNDER</button>
            </form>
            <p style="text-align:center; margin-top:20px;"><a href="index.html" style="color:#777; text-decoration:none; font-size:0.8rem;">← Geri Dön</a></p>
        </div>
    </div>

</body>
</html>
